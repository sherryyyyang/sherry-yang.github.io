research:
  current:
    title: "Current Research Focus"
    tagline: "Unlocking Alzheimer's Genetic Secrets"
    description: |
      I'm leading a team developing machine learning models that predict how genetic 
      variants affect disease risk. By analyzing long-read genome sequences and multi-omics 
      data, we're identifying the genetic variants that actually cause Alzheimer's Disease—
      not just correlate with it.
    
    impact:
      - metric: "2"
        label: "Team Members Led"
      - metric: "Nature Genetics"
        label: "Publication Venue"
      - metric: "Multiple"
        label: "Institutional Collaborations"
  
  publications:
    - title: "Long-read genome sequencing and multi-omics in aging and neurodegeneration"
      venue: "medRxiv"
      role: "Co-first author"
      description: "Pioneering work combining cutting-edge sequencing with multi-omics to understand brain aging"
      link: "#"
      tags: ["Genomics", "Machine Learning", "Alzheimer's"]
    
    - title: "Engineering Radioprotective Human Cells Using Tardigrade Proteins"
      venue: "BioRxiv"
      role: "Co-author"
      description: "Explored how tardigrade proteins could protect human cells from radiation damage"
      link: "#"
      tags: ["Synthetic Biology", "Space Medicine"]

