<section id="home" class="hero">
    <div class="hero-background">
        <div class="gradient-overlay"></div>
        <div class="particle-container" id="particles"></div>
    </div>
    
    <div class="hero-content">
        <div class="container">
            <div class="hero-text">
                <p class="hero-greeting" data-aos="fade-up">{{ site.data.content.hero.greeting }}</p>
                <h1 class="hero-headline" data-aos="fade-up" data-aos-delay="100">
                    {{ site.data.content.hero.headline }}
                </h1>
                <p class="hero-subheadline" data-aos="fade-up" data-aos-delay="200">
                    {{ site.data.content.hero.subheadline }}
                </p>
                <div class="hero-cta" data-aos="fade-up" data-aos-delay="300">
                    <a href="#research" class="btn btn-primary">
                        {{ site.data.content.hero.cta_primary }}
                        <i class="fas fa-arrow-right"></i>
                    </a>
                    <a href="#connect" class="btn btn-secondary">
                        {{ site.data.content.hero.cta_secondary }}
                    </a>
                </div>
            </div>
            
            <div class="hero-scroll" data-aos="fade-up" data-aos-delay="400">
                <a href="#about">
                    <div class="scroll-indicator">
                        <span></span>
                    </div>
                    <p>Scroll to explore</p>
                </a>
            </div>
        </div>
    </div>
</section>
