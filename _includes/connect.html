<section id="connect" class="connect-section">
    <div class="container">
        <div class="connect-content" data-aos="fade-up">
            <div class="connect-text">
                <h2>{{ site.data.content.contact.heading }}</h2>
                <p class="connect-subheading">{{ site.data.content.contact.subheading }}</p>
            </div>
            
            <div class="contact-grid">
                <div class="contact-card" data-aos="fade-up" data-aos-delay="100">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <h4>Email</h4>
                    <a href="mailto:{{ site.data.content.contact.email }}">{{ site.data.content.contact.email }}</a>
                </div>
                
                <div class="contact-card" data-aos="fade-up" data-aos-delay="200">
                    <div class="contact-icon">
                        <i class="fab fa-linkedin"></i>
                    </div>
                    <h4>LinkedIn</h4>
                    <a href="https://{{ site.data.content.contact.linkedin }}" target="_blank">Connect with me</a>
                </div>
                
                <div class="contact-card" data-aos="fade-up" data-aos-delay="300">
                    <div class="contact-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <h4>Phone</h4>
                    <a href="tel:{{ site.data.content.contact.phone }}">{{ site.data.content.contact.phone }}</a>
                </div>
                
                <div class="contact-card" data-aos="fade-up" data-aos-delay="400">
                    <div class="contact-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <h4>Location</h4>
                    <p>{{ site.data.content.contact.location }}</p>
                </div>
            </div>
            
            <div class="cta-final" data-aos="fade-up" data-aos-delay="500">
                <a href="mailto:{{ site.data.content.contact.email }}" class="btn btn-primary btn-large">
                    Get In Touch
                    <i class="fas fa-paper-plane"></i>
                </a>
            </div>
        </div>
    </div>
</section>
